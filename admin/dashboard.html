<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copyflix Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --red: #e50914;
            --red-dim: rgba(229,9,20,0.18);
            --red-glow: rgba(229,9,20,0.35);
            --gold: #f5c518;
            --green: #46d369;
            --surface-0: #060606;
            --surface-1: #0e0e0e;
            --surface-2: #161616;
            --surface-3: #1f1f1f;
            --surface-4: #2a2a2a;
            --border: rgba(255,255,255,0.07);
            --border-strong: rgba(255,255,255,0.13);
            --text-1: #f5f5f1;
            --text-2: #a3a3a3;
            --text-3: #666;
            --radius: 10px;
            --ease: cubic-bezier(0.23,1,0.32,1);
        }
        *{box-sizing:border-box;margin:0;padding:0;outline:none;}
        body{font-family:'DM Sans',sans-serif;background:var(--surface-0);color:var(--text-1);display:flex;height:100vh;overflow:hidden;}

        /* ── SIDEBAR ── */
        aside{
            width:260px;flex-shrink:0;
            background:var(--surface-1);
            border-right:1px solid var(--border);
            display:flex;flex-direction:column;
            padding:28px 16px;gap:6px;
            position:relative;z-index:100;
        }
        .logo{
            font-family:'Bebas Neue',sans-serif;
            font-size:2rem;letter-spacing:4px;
            color:var(--red);
            padding:0 10px 24px;
            display:flex;align-items:center;gap:10px;
        }
        .logo-dot{
            width:10px;height:10px;border-radius:50%;
            background:var(--red);
            box-shadow:0 0 12px var(--red-glow);
            flex-shrink:0;
        }
        .nav-section{padding:0 10px;margin:8px 0 4px;}
        .nav-section-label{font-size:0.6rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);}
        .nav-item{
            display:flex;align-items:center;gap:10px;
            padding:10px 14px;border-radius:8px;
            font-size:0.85rem;font-weight:500;color:var(--text-2);
            cursor:pointer;transition:all 0.18s;
            border:1px solid transparent;
            background:transparent;width:100%;text-align:left;
        }
        .nav-item:hover{background:var(--surface-3);color:var(--text-1);}
        .nav-item.primary{
            background:var(--red);color:#fff;
            border-color:transparent;
            margin-bottom:4px;
        }
        .nav-item.primary:hover{background:#c0000c;box-shadow:0 4px 20px var(--red-glow);}
        .nav-item.danger{color:#ff6b6b;}
        .nav-item.danger:hover{background:rgba(255,107,107,0.1);}
        .sidebar-spacer{flex:1;}

        /* ── MAIN ── */
        main{flex:1;overflow-y:auto;padding:32px 36px;scrollbar-width:thin;scrollbar-color:var(--surface-4) transparent;}
        main::-webkit-scrollbar{width:4px;}
        main::-webkit-scrollbar-thumb{background:var(--surface-4);border-radius:4px;}

        /* ── TOPBAR ── */
        .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:20px;}
        .breadcrumb{font-size:0.8rem;color:var(--text-3);display:flex;align-items:center;gap:6px;flex-shrink:0;}
        .breadcrumb b{color:var(--text-1);font-weight:500;cursor:pointer;}
        .breadcrumb b:hover{color:var(--red);}
        .breadcrumb-sep{color:var(--text-3);}

        .search-wrap{position:relative;flex:1;max-width:360px;}
        .search-wrap input{
            width:100%;background:var(--surface-2);
            border:1px solid var(--border);color:var(--text-1);
            padding:10px 14px 10px 38px;
            border-radius:8px;font-family:inherit;font-size:0.85rem;
            transition:all 0.2s;
        }
        .search-wrap input:focus{border-color:var(--red);background:var(--surface-3);}
        .search-wrap input::placeholder{color:var(--text-3);}
        .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:15px;pointer-events:none;}



        /* ── GRID ── */
        #tree-view{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
            gap:16px;
            padding-bottom:80px;
        }

        /* ── CARDS ── */
        .tree-item{
            position:relative;background:var(--surface-2);
            border-radius:10px;border:1px solid var(--border);
            cursor:grab;user-select:none;
            transition:transform 0.2s var(--ease),border-color 0.2s,box-shadow 0.2s;
        }
        .tree-item:hover{border-color:var(--border-strong);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.5);}
        .tree-item.dragging{opacity:0.25;transform:scale(0.9);}
        .tree-item.drop-center{border-color:var(--red);background:var(--red-dim);}
        .tree-item.drop-before{border-left:3px solid var(--red);}
        .tree-item.drop-after{border-right:3px solid var(--red);}

        .poster-wrap{
            position:relative;aspect-ratio:2/3;
            overflow:hidden;border-radius:9px 9px 0 0;
            background:var(--surface-3);
        }
        .tree-item img{
            width:100%;height:100%;object-fit:cover;
            transition:transform 0.4s var(--ease);
            display:block;
        }
        .tree-item:hover img{transform:scale(1.04);}

        /* Status badge */
        .status-badge{
            position:absolute;top:9px;left:9px;z-index:20;
            padding:4px 9px;border-radius:20px;
            font-size:0.6rem;font-weight:700;letter-spacing:0.5px;
            cursor:pointer;text-transform:uppercase;
            backdrop-filter:blur(8px);
        }
        .s-on{background:rgba(70,211,105,0.18);color:var(--green);border:1px solid rgba(70,211,105,0.35);}
        .s-off{background:rgba(229,9,20,0.18);color:#ff6b6b;border:1px solid rgba(229,9,20,0.35);}

        /* Category badge */
        .cat-badge{
            position:absolute;top:9px;right:9px;z-index:20;
            padding:4px 8px;border-radius:6px;
            font-size:0.58rem;font-weight:700;letter-spacing:0.3px;
            text-transform:uppercase;display:flex;align-items:center;gap:4px;
            backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);
        }
        .cat-badge i{width:11px;height:11px;stroke-width:3;}

        /* Inactive overlay */
        .inactive-overlay{
            position:absolute;inset:0;z-index:5;
            background:repeating-linear-gradient(
                -45deg,
                rgba(0,0,0,0) 0px,
                rgba(0,0,0,0) 6px,
                rgba(229,9,20,0.06) 6px,
                rgba(229,9,20,0.06) 7px
            );
            border-radius:9px 9px 0 0;pointer-events:none;
        }

        /* Card info */
        .card-info{padding:11px 12px;display:flex;align-items:center;gap:8px;}
        .card-title{
            font-size:0.8rem;font-weight:500;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
        }
        .card-type-dot{
            width:6px;height:6px;border-radius:50%;flex-shrink:0;
            background:var(--text-3);
        }
        .type-film .card-type-dot{background:var(--gold);}
        .type-series .card-type-dot{background:#4fc3f7;}
        .type-folder .card-type-dot{background:var(--red);}

        /* Hover actions */
        .card-actions{
            position:absolute;inset:0;
            background:rgba(0,0,0,0.75);
            display:flex;align-items:center;justify-content:center;gap:8px;
            opacity:0;transition:opacity 0.2s;border-radius:9px;z-index:30;
        }
        .tree-item:hover .card-actions{opacity:1;}
        .action-btn{
            width:36px;height:36px;border-radius:50%;
            border:none;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            font-size:14px;transition:transform 0.15s;
        }
        .action-btn:hover{transform:scale(1.1);}
        .btn-toggle{background:rgba(245,197,24,0.85);color:#000;}
        .btn-edit{background:rgba(255,255,255,0.9);color:#000;}
        .btn-del{background:rgba(229,9,20,0.85);color:#fff;}

        /* ── PANEL ── */
        #panel-overlay{
            display:none;position:fixed;inset:0;
            background:rgba(0,0,0,0.9);z-index:2000;
            backdrop-filter:blur(20px);
            animation:fIn 0.25s ease;
        }
        @keyframes fIn{from{opacity:0}to{opacity:1}}
        @keyframes slideUp{from{opacity:0;transform:translate(-50%,-46%)}to{opacity:1;transform:translate(-50%,-50%)}}

        #panel{
            position:absolute;top:50%;left:50%;
            transform:translate(-50%,-50%);
            background:var(--surface-1);
            width:880px;max-width:95vw;
            border-radius:18px;border:1px solid var(--border-strong);
            display:flex;overflow:hidden;
            box-shadow:0 40px 80px rgba(0,0,0,0.7);
            animation:slideUp 0.3s var(--ease);
            max-height:90vh;
        }

        .panel-form-side{
            flex:1.3;padding:36px 36px;
            overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--surface-4) transparent;
        }
        .panel-preview-side{
            flex:0.7;background:var(--surface-0);
            border-left:1px solid var(--border);
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            padding:32px 24px;gap:16px;
        }

        .panel-title{
            font-family:'Bebas Neue',sans-serif;
            font-size:1.8rem;letter-spacing:2px;
            color:var(--text-1);margin-bottom:28px;
        }

        .tmdb-section{
            background:var(--surface-2);border:1px solid var(--border);
            border-radius:10px;padding:16px;margin-bottom:24px;
        }
        .tmdb-label{font-size:0.62rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);margin-bottom:10px;}
        .tmdb-row{display:flex;gap:8px;}
        .tmdb-input{
            flex:1;background:var(--surface-0);border:1px solid var(--border);
            color:var(--text-1);padding:10px 14px;border-radius:8px;
            font-family:inherit;font-size:0.85rem;transition:border-color 0.2s;
        }
        .tmdb-input:focus{border-color:var(--red);}
        .tmdb-input::placeholder{color:var(--text-3);}
        .tmdb-btn{
            background:var(--red);color:#fff;border:none;
            padding:10px 18px;border-radius:8px;
            font-family:inherit;font-size:0.82rem;font-weight:600;
            cursor:pointer;white-space:nowrap;transition:all 0.2s;
        }
        .tmdb-btn:hover{background:#c0000c;box-shadow:0 4px 16px var(--red-glow);}

        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
        .full{grid-column:span 2;}

        .fgroup{display:flex;flex-direction:column;gap:7px;}
        .flabel{font-size:0.62rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);}
        .finput, .fselect{
            background:var(--surface-2);border:1px solid var(--border);
            color:var(--text-1);padding:10px 14px;border-radius:8px;
            font-family:inherit;font-size:0.88rem;
            transition:border-color 0.2s,background 0.2s;
            -webkit-appearance:none;
        }
        .finput:focus,.fselect:focus{border-color:var(--red);background:var(--surface-3);}
        .finput::placeholder{color:var(--text-3);}
        .fselect option{background:var(--surface-2);}

        .form-actions{display:flex;gap:10px;margin-top:28px;}
        .btn-save{
            flex:2;background:var(--red);color:#fff;
            border:none;padding:14px;border-radius:9px;
            font-family:inherit;font-size:0.9rem;font-weight:600;
            cursor:pointer;transition:all 0.2s;
        }
        .btn-save:hover{background:#c0000c;box-shadow:0 4px 20px var(--red-glow);}
        .btn-cancel{
            flex:1;background:var(--surface-3);color:var(--text-2);
            border:1px solid var(--border);padding:14px;border-radius:9px;
            font-family:inherit;font-size:0.88rem;cursor:pointer;transition:all 0.2s;
        }
        .btn-cancel:hover{background:var(--surface-4);color:var(--text-1);}

        /* Preview side */
        .preview-lbl{font-size:0.6rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);}
        .preview-wrap{transform:scale(1.05);pointer-events:none;width:200px;}

        /* ── TOAST ── */
        #toast{
            position:fixed;bottom:28px;right:28px;
            background:var(--green);color:#000;
            padding:12px 22px;border-radius:10px;
            font-weight:700;font-size:0.85rem;
            display:none;z-index:9999;
            animation:fIn 0.2s ease;
        }

        /* Empty state */
        .empty-state{
            grid-column:1/-1;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            padding:80px 20px;gap:12px;color:var(--text-3);
        }
        .empty-state-icon{font-size:3rem;opacity:0.3;}
        .empty-state-text{font-size:0.9rem;}

        /* Section divider for inactive */
        .section-divider{
            grid-column:1/-1;
            display:flex;align-items:center;gap:14px;
            padding:8px 0 4px;
        }
        .section-divider-line{flex:1;height:1px;background:var(--border);}
        .section-divider-label{
            font-size:0.65rem;font-weight:600;letter-spacing:1.5px;
            text-transform:uppercase;color:var(--text-3);white-space:nowrap;
            display:flex;align-items:center;gap:6px;
        }
    </style>
</head>
<body>

<aside>
    <div class="logo"><div class="logo-dot"></div>COPYFLIX</div>

    <div class="nav-section"><span class="nav-section-label">Gestion</span></div>
    <button class="nav-item primary" id="btn-add-film">
        <span>＋</span> Ajouter un Média
    </button>
    <button class="nav-item" id="btn-add-folder">
        <span>📂</span> Nouveau Dossier
    </button>

    <div class="nav-section" style="margin-top:16px;"><span class="nav-section-label">Données</span></div>
    <button class="nav-item" id="btn-copy-json">
        <span>📋</span> Exporter JSON
    </button>

    <div class="sidebar-spacer"></div>

    <button class="nav-item danger" id="btn-logout">
        <span>🚪</span> Déconnexion
    </button>
</aside>

<main>
    <div class="topbar">
        <div class="breadcrumb" id="breadcrumb">
            <b onclick="navigateTo('')">Racine</b>
        </div>
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-bar" placeholder="Recherche globale…">
        </div>
    </div>



    <div id="tree-view"></div>
</main>

<!-- PANEL -->
<div id="panel-overlay">
    <div id="panel">
        <div class="panel-form-side">
            <div class="panel-title" id="panel-title">Nouveau Média</div>

            <div class="tmdb-section">
                <div class="tmdb-label">⚡ Auto-remplissage TMDB</div>
                <div class="tmdb-row">
                    <input type="text" class="tmdb-input" id="tmdb-input" placeholder="ID ou lien TMDB (ex: 27205)">
                    <button class="tmdb-btn" onclick="fetchTMDB()">Récupérer</button>
                </div>
            </div>

            <form id="panel-form">
                <input type="hidden" id="item-id">
                <input type="hidden" id="item-active-hidden">

                <div class="form-grid">
                    <div class="fgroup full">
                        <label class="flabel">Titre du média</label>
                        <input type="text" id="item-title" class="finput" required oninput="updatePreview()" placeholder="Ex: Inception">
                    </div>
                    <div class="fgroup">
                        <label class="flabel">Catégorie</label>
                        <select id="item-category" class="fselect" onchange="updatePreview()">
                            <option value="">Aucune</option>
                            <option value="Action">Action ⚔️</option>
                            <option value="Comédie">Comédie 😂</option>
                            <option value="Horreur">Horreur 👻</option>
                            <option value="Science-fiction">Science-fiction 🚀</option>
                            <option value="Animation">Animation 🍄</option>
                            <option value="Documentaire">Documentaire 🌍</option>
                        </select>
                    </div>
                    <div class="fgroup">
                        <label class="flabel">Type</label>
                        <select id="item-type" class="fselect" onchange="updatePreview()">
                            <option value="Film">Film</option>
                            <option value="Série">Série</option>
                            <option value="Folder">Dossier</option>
                        </select>
                    </div>
                    <div class="fgroup full">
                        <label class="flabel">URL Poster</label>
                        <input type="text" id="item-image" class="finput" oninput="updatePreview()" placeholder="https://…">
                    </div>
                    <div class="fgroup full">
                        <label class="flabel">Lien Vidéo / Source</label>
                        <input type="text" id="item-video" class="finput" placeholder="ID YouTube ou lien direct">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-save">Enregistrer</button>
                    <button type="button" class="btn-cancel" onclick="closePanel()">Annuler</button>
                </div>
            </form>
        </div>

        <div class="panel-preview-side">
            <div class="preview-lbl">Aperçu</div>
            <div id="live-preview-container" class="preview-wrap"></div>
        </div>
    </div>
</div>

<div id="toast">Copié !</div>

<script>
const TMDB_API_KEY="a05cb0aa7f238cb1cbbbdfaebf1e2df3";
const TMDB_IMG_PATH="https://image.tmdb.org/t/p/w500";
const CATEGORIES={
    "Action":{color:"#ff3333",icon:"zap"},
    "Comédie":{color:"#ffc800",icon:"laugh"},
    "Horreur":{color:"#e0e0e0",icon:"skull"},
    "SF":{color:"#0096ff",icon:"rocket"},
    "Animation":{color:"#00ff88",icon:"palette"},
    "Docu":{color:"#b464ff",icon:"globe"}
};

let data={folders:[],films:[]};
let currentPath=[];
let draggedItemId=null;
let searchQuery="";
let showActiveTab=true;

const treeView=document.getElementById("tree-view");
const searchBar=document.getElementById("search-bar");

function updatePreview(){
    const title=document.getElementById('item-title').value||"Titre du média";
    const categoryName=document.getElementById('item-category').value;
    const type=document.getElementById('item-type').value;
    const image=document.getElementById('item-image').value||'https://via.placeholder.com/300x450/111/333?text=Copyflix';
    const isActive=document.getElementById('item-active-hidden').value==="true";
    let catHtml="";
    if(categoryName&&CATEGORIES[categoryName]){
        const cat=CATEGORIES[categoryName];
        catHtml=`<div class="cat-badge" style="background:${cat.color}22;color:${cat.color};border-color:${cat.color}44;"><i data-lucide="${cat.icon}"></i>${categoryName}</div>`;
    }
    const typeClass=type==="Film"?"type-film":type==="Série"?"type-series":"type-folder";
    document.getElementById("live-preview-container").innerHTML=`
        <div class="tree-item ${typeClass}" style="cursor:default;transform:none;">
            <div class="poster-wrap">
                <div class="status-badge ${isActive?'s-on':'s-off'}">${isActive?'Dispo':'Off'}</div>
                ${catHtml}
                ${!isActive?'<div class="inactive-overlay"></div>':''}
                <img src="${image}">
            </div>
            <div class="card-info">
                <div class="card-type-dot"></div>
                <div class="card-title">${(type==="Folder"?"📁 ":"")+title}</div>
            </div>
        </div>`;
    lucide.createIcons();
}



async function fetchTMDB(){
    const input=document.getElementById('tmdb-input').value;
    if(!input)return;
    const isTV=input.includes('/tv/');
    const type=isTV?'tv':'movie';
    const idMatch=input.match(/\/(movie|tv)\/(\d+)/);
    const id=idMatch?idMatch[2]:input.trim();
    try{
        const r=await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_API_KEY}&language=fr-FR`);
        const res=await r.json();
        if(res.id){
            document.getElementById('item-title').value=res.title||res.name;
            document.getElementById('item-image').value=TMDB_IMG_PATH+res.poster_path;
            document.getElementById('item-type').value=isTV?"Série":"Film";
            updatePreview();
        }
    }catch(e){alert("Erreur TMDB");}
}

function getAllItems(root,list=[]){
    root.folders.forEach(f=>{list.push(f);if(f.children)getAllItems({folders:f.children.filter(c=>c.type==='Folder'),films:f.children.filter(c=>c.type!=='Folder')},list);});
    root.films.forEach(f=>list.push(f));
    return list;
}
function findItem(id,root){
    let found=null;
    const scan=(arr)=>{for(let i of arr){if(i.id===id)found=i;if(!found&&i.children)scan(i.children);}};
    scan(root.folders);scan(root.films);return found;
}
function removeFromParent(id,root){
    const remove=(arr)=>{
        const idx=arr.findIndex(x=>x.id===id);
        if(idx>-1){arr.splice(idx,1);return true;}
        return arr.some(x=>x.children&&remove(x.children));
    };
    remove(root.folders);remove(root.films);
}
function propagateCategory(item,category){
    if(!item.children)return;
    item.children.forEach(child=>{child.category=category;if(child.type==="Folder")propagateCategory(child,category);});
}
function saveAndRefresh(){localStorage.setItem("copyflixData",JSON.stringify(data));renderTree();}
function toggleStatus(id){const item=findItem(id,data);if(item){item.active=!item.active;saveAndRefresh();}}

function onDragStart(e){if(searchQuery!==""){e.preventDefault();return;}draggedItemId=this.dataset.id;this.classList.add('dragging');e.dataTransfer.setData("text/plain",draggedItemId);}
function onDragOver(e){
    e.preventDefault();if(searchQuery!=="")return;
    const rect=this.getBoundingClientRect();
    const relX=e.clientX-rect.left;
    const targetItem=findItem(this.dataset.id,data);
    this.classList.remove('drop-before','drop-after','drop-center');
    if(targetItem.type==="Folder"){
        if(relX>rect.width*0.25&&relX<rect.width*0.75)this.classList.add('drop-center');
        else if(relX<=rect.width*0.25)this.classList.add('drop-before');
        else this.classList.add('drop-after');
    }else{
        if(relX<rect.width/2)this.classList.add('drop-before');
        else this.classList.add('drop-after');
    }
}
function onDrop(e){
    e.preventDefault();
    const targetId=this.dataset.id;
    if(!targetId||targetId===draggedItemId)return;
    const rect=this.getBoundingClientRect();
    const relX=e.clientX-rect.left;
    const targetItem=findItem(targetId,data);
    const draggedItem=findItem(draggedItemId,data);
    removeFromParent(draggedItemId,data);
    const activeParentId=currentPath.length>0?currentPath[currentPath.length-1]:"";
    if(targetItem.type==="Folder"&&relX>rect.width*0.25&&relX<rect.width*0.75){
        draggedItem.parentId=targetId;
        if(!targetItem.children)targetItem.children=[];
        targetItem.children.push(draggedItem);
    }else{
        draggedItem.parentId=activeParentId;
        let arr=!activeParentId?(draggedItem.type==="Folder"?data.folders:data.films):findItem(activeParentId,data).children;
        const targetIdx=arr.findIndex(i=>i.id===targetId);
        arr.splice((relX<rect.width/2)?targetIdx:targetIdx+1,0,draggedItem);
    }
    saveAndRefresh();
}

function renderTree(){
    treeView.innerHTML="";
    let bHtml='<b onclick="navigateTo(\'\')">Racine</b>';
    currentPath.forEach(id=>{const f=findItem(id,data);if(f)bHtml+=`<span class="breadcrumb-sep">›</span><b onclick="navigateTo('${id}')">${f.title}</b>`;});
    document.getElementById("breadcrumb").innerHTML=searchQuery!==""?`<b style="color:var(--red)">"${searchQuery}"</b>`:bHtml;

    let allCurrentItems=searchQuery!==""
        ?getAllItems(data).filter(i=>i.title.toLowerCase().includes(searchQuery))
        :(currentPath.length===0?[...data.folders,...data.films]:(findItem(currentPath[currentPath.length-1],data).children||[]));

    const active=allCurrentItems.filter(i=>i.active);
    const inactive=allCurrentItems.filter(i=>!i.active);

    if(inactive.length>0){
        const divider=document.createElement("div");
        divider.className="section-divider";
        divider.innerHTML=`<div class="section-divider-line"></div><div class="section-divider-label">⏸ Inactifs (${inactive.length})</div><div class="section-divider-line"></div>`;
        treeView.appendChild(divider);
        inactive.forEach(item=>treeView.appendChild(buildCard(item)));
        if(active.length>0){
            const divider2=document.createElement("div");
            divider2.className="section-divider";
            divider2.innerHTML=`<div class="section-divider-line"></div><div class="section-divider-label">✅ Actifs (${active.length})</div><div class="section-divider-line"></div>`;
            treeView.appendChild(divider2);
        }
    }
    active.forEach(item=>treeView.appendChild(buildCard(item)));

    if(treeView.children.length===0||treeView.querySelector('.tree-item')===null){
        const empty=document.createElement("div");
        empty.className="empty-state";
        empty.innerHTML=`<div class="empty-state-icon">🎬</div><div class="empty-state-text">Aucun média ici</div>`;
        treeView.appendChild(empty);
    }

    lucide.createIcons();
}

function buildCard(item){
    const div=document.createElement("div");
    const typeClass=item.type==="Film"?"type-film":item.type==="Série"?"type-series":"type-folder";
    div.className=`tree-item ${typeClass}`;
    div.draggable=(searchQuery==="");
    div.dataset.id=item.id;
    div.ondragstart=onDragStart;div.ondragover=onDragOver;div.ondrop=onDrop;
    div.ondragleave=()=>div.classList.remove('drop-before','drop-after','drop-center');
    let catHtml="";
    if(item.category&&CATEGORIES[item.category]){
        const cat=CATEGORIES[item.category];
        catHtml=`<div class="cat-badge" style="background:${cat.color}22;color:${cat.color};border-color:${cat.color}44;"><i data-lucide="${cat.icon}"></i>${item.category}</div>`;
    }
    div.innerHTML=`
        <div class="poster-wrap">
            <div class="status-badge ${item.active?'s-on':'s-off'}">${item.active?'Dispo':'Off'}</div>
            ${catHtml}
            ${!item.active?'<div class="inactive-overlay"></div>':''}
            <img src="${item.image||'https://via.placeholder.com/300x450/111/333?text=Copyflix'}" loading="lazy">
            <div class="card-actions">
                <button class="action-btn btn-toggle" title="${item.active?'Désactiver':'Activer'}">${item.active?'⏸':'▶️'}</button>
                <button class="action-btn btn-edit">✏️</button>
                <button class="action-btn btn-del">🗑️</button>
            </div>
        </div>
        <div class="card-info">
            <div class="card-type-dot"></div>
            <div class="card-title">${(item.type==="Folder"?"📁 ":"")+item.title}</div>
        </div>`;
    div.querySelector('.status-badge').onclick=(e)=>{e.stopPropagation();toggleStatus(item.id);};
    div.querySelector('.btn-toggle').onclick=(e)=>{e.stopPropagation();toggleStatus(item.id);};
    div.querySelector('.btn-edit').onclick=(e)=>{e.stopPropagation();openPanel(item.type,item.id);};
    div.querySelector('.btn-del').onclick=(e)=>{e.stopPropagation();deleteItem(item.id);};
    if(item.type==="Folder") div.onclick=(e)=>{if(!e.target.closest('.action-btn')&&!e.target.closest('.status-badge'))navigateTo(item.id);};
    return div;
}

function navigateTo(id){
    searchBar.value="";searchQuery="";
    if(!id)currentPath=[];
    else{const idx=currentPath.indexOf(id);if(idx!==-1)currentPath=currentPath.slice(0,idx+1);else currentPath.push(id);}
    renderTree();
}
searchBar.oninput=(e)=>{searchQuery=e.target.value.toLowerCase();renderTree();};

function openPanel(type,id=null){
    const item=id?findItem(id,data):null;
    document.getElementById("panel-overlay").style.display="block";
    document.getElementById("panel-title").textContent=id?"Modifier le Média":"Nouveau Média";
    document.getElementById("item-id").value=id||"";
    document.getElementById("item-title").value=item?item.title:"";
    document.getElementById("tmdb-input").value="";
    if(item){
        document.getElementById("item-category").value=item.category||"";
    }else{
        const parentId=currentPath[currentPath.length-1];
        const parent=parentId?findItem(parentId,data):null;
        document.getElementById("item-category").value=(parent&&parent.category)?parent.category:"";
    }
    document.getElementById("item-type").value=item?item.type:type;
    document.getElementById("item-image").value=item?item.image:"";
    document.getElementById("item-video").value=item?item.video||"":"";
    document.getElementById("item-active-hidden").value=item?item.active:"true";
    updatePreview();
}
function closePanel(){document.getElementById("panel-overlay").style.display="none";}

document.getElementById("panel-form").onsubmit=(e)=>{
    e.preventDefault();
    const id=document.getElementById("item-id").value;
    const category=document.getElementById("item-category").value;
    const vals={
        title:document.getElementById("item-title").value,
        type:document.getElementById("item-type").value,
        category:category,
        image:document.getElementById("item-image").value,
        video:document.getElementById("item-video").value,
        active:document.getElementById("item-active-hidden").value==="true"
    };
    if(id){
        const item=findItem(id,data);
        Object.assign(item,vals);
        if(item.type==="Folder"&&category)propagateCategory(item,category);
    }else{
        const newItem={id:"id-"+Date.now(),...vals,children:[],parentId:currentPath[currentPath.length-1]||""};
        if(!newItem.parentId)(vals.type==="Folder"?data.folders:data.films).push(newItem);
        else findItem(newItem.parentId,data).children.push(newItem);
    }
    saveAndRefresh();closePanel();
};

function deleteItem(id){if(confirm("Supprimer ?")){{removeFromParent(id,data);saveAndRefresh();}}}

async function initData(){
    const saved=localStorage.getItem("copyflixData");
    if(saved){data=JSON.parse(saved);renderTree();}
    else{
        try{
            const r=await fetch('../data.json');
            if(!r.ok)throw new Error();
            data=await r.json();saveAndRefresh();
        }catch(e){renderTree();}
    }
}

document.getElementById("btn-add-folder").onclick=()=>openPanel("Folder");
document.getElementById("btn-add-film").onclick=()=>openPanel("Film");
document.getElementById("btn-copy-json").onclick=()=>{
    navigator.clipboard.writeText(JSON.stringify(data,null,2));
    const t=document.getElementById("toast");t.style.display="block";setTimeout(()=>t.style.display="none",2000);
};
document.getElementById("btn-logout").onclick=()=>window.location.href="../index.html";

initData();
</script>
